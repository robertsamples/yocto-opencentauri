name: Build OpenCentauri Image (on push main)
on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      use_cache: true
      write_back_cache: true
      upload_all_artifacts: true

  publish-nightly:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CC1 Firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: CC1 Firmware
          path: ./firmware

      - name: Upload SWU to nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload 0.0.0 \
            "./firmware/opencentauri-upgrade-elegoo-centauri-carbon1.rootfs.swu" \
            --clobber \
            --repo OpenCentauri/yocto-opencentauri