name: Build OpenCentauri Image (on PR)
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  approve:
    runs-on: ubuntu-latest
    environment: approval-needed
    steps:
      - run: echo "Approved"

  build:
    needs: approve
    uses: ./.github/workflows/build.yml
    with:
      use_cache: true
      write_back_cache: false
      upload_all_artifacts: false

  comment:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get workflow run info
        id: run_info
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const startedAt = new Date(run.data.run_started_at);
            const now = new Date();
            const durationMs = now - startedAt;
            const minutes = Math.floor(durationMs / 60000);
            const seconds = Math.floor((durationMs % 60000) / 1000);
            const duration = `${minutes}m ${seconds}s`;

            const headSha = context.payload.pull_request.head.sha.substring(0, 7);
            const baseSha = context.payload.pull_request.base.sha.substring(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            let artifactRows = '';
            for (const artifact of artifacts.data.artifacts) {
              const sizeMB = (artifact.size_in_bytes / (1024 * 1024)).toFixed(2);
              artifactRows += `| ${artifact.name} | ${sizeMB} MB |\n`;
            }

            if (!artifactRows) {
              artifactRows = '| _No artifacts uploaded_ | - |\n';
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## ✅ Build Artifacts\n\n` +
              `**Branch:** \`${branch}\`\n` +
              `**Build:** \`${headSha}\` (merge into \`${context.payload.pull_request.base.ref}\`)\n` +
              `**Duration:** ${duration}\n\n` +
              `| Artifact | Size |\n` +
              `| --- | --- |\n` +
              artifactRows + `\n` +
              `[View workflow run](${runUrl})`;

            core.setOutput('body', body);

      - name: Post PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.run_info.outputs.body }}