# EDITING THIS FILE WILL EXCLUDE YOUR CHANGES FROM FUTURE UPDATES.
# -----

[mcu hotend]
serial: /dev/serial/by-path/platform-4101400.usb-usb-0:1:1.0
restart_method: command

[thermistor hotend_termistor]
temperature1: 25
resistance1: 100000
beta: 4300

[extruder]
step_pin: hotend:PC13
dir_pin: hotend:PC14
enable_pin: !hotend:PC15
heater_pin: hotend:PB6
sensor_pin: hotend:PA3
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 52:10
rotation_distance: 28.8
nozzle_diameter: 0.400000
filament_diameter: 1.750000
sensor_type: hotend_termistor
min_temp: -200
max_temp: 335
min_extrude_temp: 170
pressure_advance: 0.04
pressure_advance_smooth_time: 0.04
max_extrude_only_velocity: 60
max_extrude_only_accel: 5000
max_extrude_only_distance: 120

[tmc2209 extruder]
tx_pin: hotend:PC6
uart_pin: hotend:PC7
interpolate: 1
run_current: 0.8
hold_current: 0.5
uart_address: 3
sense_resistor: 0.1
driver_sgthrs: 10
stealthchop_threshold: 0

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[led hotend]
white_pin: hotend:PC9

[lis2dw]
spi_speed: 5000000
cs_pin: hotend:PA4
spi_bus: spi1
axes_map: x,z,-y

[heater_fan extruder]
pin: hotend:PC8
tachometer_pin: hotend:PA1

[fan]
pin: hotend:PB5
tachometer_pin: hotend:PA0

[temperature_sensor toolboard]
sensor_type: temperature_mcu
sensor_mcu: hotend