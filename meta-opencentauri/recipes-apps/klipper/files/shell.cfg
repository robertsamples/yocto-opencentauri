[gcode_shell_command START_DOOM]
command: play-doom
timeout: 9999999
verbose: False

[gcode_macro DOOM]
gcode:
    RUN_SHELL_COMMAND CMD=START_DOOM

[gcode_shell_command CAMERA_LIGHT_ON]
command: v4l2-ctl -d /dev/video0 --set-ctrl backlight_compensation=1
timeout: 5
verbose: False

[gcode_shell_command CAMERA_LIGHT_OFF]
command: v4l2-ctl -d /dev/video0 --set-ctrl backlight_compensation=0
timeout: 5
verbose: False

[gcode_macro SYNC_CAMERA_LED]
variable_last_state: 0
gcode:
  {% set current = printer["led case"].color_data[0][3] > 0 %}
  {% set last = printer["gcode_macro SYNC_CAMERA_LED"].last_state %}

  {% if current != last %}
    SET_GCODE_VARIABLE MACRO=SYNC_CAMERA_LED VARIABLE=last_state VALUE={current}
    {% if current %}
      RUN_SHELL_COMMAND CMD=CAMERA_LIGHT_ON
    {% else %}
      RUN_SHELL_COMMAND CMD=CAMERA_LIGHT_OFF
    {% endif %}
  {% endif %}

[delayed_gcode sync_camera_led_loop]
initial_duration: 2.0
gcode:
  {% set settings = printer["gcode_macro _COSMOS_SETTINGS"]|default({}) %}
  {% set sync = settings.sync_camera_led_to_chamber_led|default(false)|lower == 'true' %}

  {% if sync %}
    SYNC_CAMERA_LED
    UPDATE_DELAYED_GCODE ID=sync_camera_led_loop DURATION=2
  {% endif %}
