# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# EDITING THIS FILE WILL EXCLUDE YOUR CHANGES FROM FUTURE UPDATES.
# -----

[mcu]
serial: /dev/ttyRPMSG0
restart_method: command

[mcu bed]
serial: /dev/ttyS4
baud: 250000
restart_method: command
is_non_critical: true

[mcu hotend]
serial: /dev/serial/by-path/platform-4101400.usb-usb-0:1:1.0
restart_method: command

[danger_options]
multi_mcu_trsync_timeout: 0.03

[stepper_x]
step_pin: PE8
dir_pin: !PE7
enable_pin: !PE10
endstop_pin: tmc2209_stepper_x:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: 256.5
position_max: 256.5
position_min: -2.01
homing_speed: 80
homing_retract_dist: 0
rotation_distance: 39.872

[stepper_y]
step_pin: PE14
dir_pin: !PE13
enable_pin: !PE15
endstop_pin: tmc2209_stepper_y:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: -2.5
position_max: 270.000000
position_min: -2.5
homing_speed: 80
homing_retract_dist: 0
rotation_distance: 39.872

[stepper_z]
step_pin: PG3
dir_pin: !PG2
enable_pin: !PG1
endstop_pin: PG8
microsteps: 16
full_steps_per_rotation: 200
position_endstop: 4.5
position_max: 258.000000
position_min: -5
homing_speed: 8.000000
homing_retract_dist: 10
homing_retract_speed: 6
second_homing_speed: 3.000000
rotation_distance: 8

[extruder]
step_pin: hotend:PC13
dir_pin: hotend:PC14
enable_pin: !hotend:PC15
heater_pin: hotend:PB6
sensor_pin: hotend:PA3
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 52:10
rotation_distance: 28.8
nozzle_diameter: 0.400000
filament_diameter: 1.750000
sensor_type: hotend_termistor
min_temp: -200
max_temp: 335
min_extrude_temp: 170
pressure_advance: 0.04
pressure_advance_smooth_time: 0.04
max_extrude_only_velocity: 60
max_extrude_only_accel: 5000
max_extrude_only_distance: 120
control: pid
pid_Kp: 24.860427
pid_Ki: 2.702253
pid_Kd: 57.178292

[tmc2209 stepper_x]
tx_pin: PE9
uart_pin: PE6
uart_address: 0
interpolate: 1
run_current: 1.0
home_current: 0.8
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 0
diag_pin: !PG4

[tmc2209 stepper_y]
tx_pin: PE9
uart_pin: PE6
interpolate: 1
run_current: 1.0
home_current: 0.8
uart_address: 3
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 0
diag_pin: !PF6

[tmc2209 stepper_z]
tx_pin: PE9
uart_pin: PE6
interpolate: 1
run_current: 0.8
uart_address: 1
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 99999

[tmc2209 extruder]
tx_pin: hotend:PC6
uart_pin: hotend:PC7
interpolate: 1
run_current: 0.8
hold_current: 0.5
uart_address: 3
sense_resistor: 0.1
driver_sgthrs: 10
stealthchop_threshold: 0

[led case]
white_pin: PG15
initial_WHITE: 1

[led hotend]
white_pin: hotend:PC9

[heater_bed]
heater_pin: PG13
sensor_pin: PB14
sensor_type: Generic 3950
min_temp: -200
max_temp: 125
control: pid
pid_Kp: 46.504839
pid_Ki: 1.453276
pid_Kd: 372.038710

[verify_heater heater_bed]
max_error: 120
check_gain_time: 120
hysteresis: 5
heating_gain: 2

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[temperature_sensor box]
sensor_pin: PB13
sensor_type: Generic 3950
min_temp: -200
max_temp: 125

[fan_generic model_helper_fan]
pin: PG17

[fan_generic box_fan]
pin: PG18

[temperature_fan mainboard]
pin: PG16
tachometer_pin: PG6
min_temp: 5
max_temp: 85
target_temp: 65
min_speed: 0
sensor_type: temperature_host
control: pid
pid_Kp: 2
pid_Ki: 5
pid_Kd: 0.5

[bed_mesh]
speed: 150.0
horizontal_move_z: 2.0
mesh_min: 20,20
mesh_max: 246,246
probe_count: 11,11
mesh_pps: 3,3
algorithm: bicubic
adaptive_margin: 5.0

[hx71x sg0]
chip: hx711
dout_pin: bed:PB14
sclk_pin: bed:PB13
sample_rate: 80
gain: A-128

[hx71x sg1]
chip: hx711
dout_pin: bed:PC8
sclk_pin: bed:PC7
sample_rate: 80
gain: A-128

[hx71x sg2]
chip: hx711
dout_pin: bed:PB15
sclk_pin: bed:PC6
sample_rate: 80
gain: A-128

[hx71x sg3]
chip: hx711
dout_pin: bed:PA8
sclk_pin: bed:PC9
sample_rate: 80
gain: A-128

[load_cell_probe]
sensor_type: load_cell_fusion
sensors: hx71x sg0, hx71x sg1, hx71x sg2, hx71x sg3
samples: 2
samples_tolerance_retries: 2
speed: 2.0
sample_retract_dist: 1.0
lift_speed: 5.0
counts_per_gram: 29.11
reference_tare_counts: 71000
z_offset: -0.15
trigger_force: 50

[printer]
kinematics: corexy
max_velocity: 500.000000
max_accel: 20000.000000
max_z_velocity: 20.000000
max_z_accel: 500.000000
square_corner_velocity: 9.000000

[gcode_arcs]
resolution: 0.5

[pause_resume]

[exclude_object]

[input_shaper]
damping_ratio_x: 0.06
damping_ratio_y: 0.082

[resonance_tester]
probe_points: 128,128,5
accel_chip: lis2dw
min_freq: 5.000000
max_freq: 75.000000
accel_per_hz: 100.000000
hz_per_sec: 1.000000

[screws_tilt_adjust]
screw1: 28.5, 28.5
screw1_name: front left screw
screw2: 228.5, 28.5
screw2_name: front right screw
screw3: 228.5, 228.5
screw3_name: rear right screw
screw4: 28.5, 228.5
screw4_name: rear left screw
horizontal_move_z: 5
speed: 350
screw_thread: CW-M3

[thermistor hotend_termistor]
temperature1: 25
resistance1: 100000
beta: 4300

[lis2dw]
spi_speed: 5000000
cs_pin: hotend:PA4
spi_bus: spi1
axes_map: x,z,-y

[heater_fan extruder]
pin: hotend:PC8
tachometer_pin: hotend:PA1

[fan]
pin: hotend:PB5
tachometer_pin: hotend:PA0

[temperature_sensor mcu_toolhead]
sensor_type: temperature_mcu
sensor_mcu: hotend

[temperature_sensor mcu_bed]
sensor_type: temperature_mcu
sensor_mcu: bed
