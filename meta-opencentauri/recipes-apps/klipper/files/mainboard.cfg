# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# EDITING THIS FILE WILL EXCLUDE YOUR CHANGES FROM FUTURE UPDATES.
# -----

[mcu]
serial: /dev/ttyRPMSG0
restart_method: command

[stepper_x]
step_pin: PE8
dir_pin: !PE7
enable_pin: !PE10
endstop_pin: tmc2209_stepper_x:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: 256.499
position_max: 256.5
position_min: -2.01
homing_speed: 80
homing_retract_dist: 3
rotation_distance: 39.872

[stepper_y]
step_pin: PE14
dir_pin: !PE13
enable_pin: !PE15
endstop_pin: tmc2209_stepper_y:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: -2.5
position_max: 270.000000
position_min: -2.51
homing_speed: 80
homing_retract_dist: 3
rotation_distance: 39.872

[stepper_z]
step_pin: PG3
dir_pin: !PG2
enable_pin: !PG1
endstop_pin: PG8
microsteps: 16
full_steps_per_rotation: 200
position_endstop: 4.5
position_max: 258.000000
position_min: -5
homing_speed: 8.000000
homing_retract_dist: 10
homing_retract_speed: 6
second_homing_speed: 3.000000
rotation_distance: 8

[tmc2209 stepper_x]
tx_pin: PE9
uart_pin: PE6
uart_address: 0
interpolate: 1
run_current: 1.0
home_current: 0.8
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 0
diag_pin: !PG4

[tmc2209 stepper_y]
tx_pin: PE9
uart_pin: PE6
interpolate: 1
run_current: 1.0
home_current: 0.8
uart_address: 3
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 0
diag_pin: !PF6

[tmc2209 stepper_z]
tx_pin: PE9
uart_pin: PE6
interpolate: 1
run_current: 0.8
uart_address: 1
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 99999

[led case]
white_pin: PG15
initial_WHITE: 1.0

[heater_bed]
heater_pin: PG13
sensor_pin: PB14
sensor_type: Generic 3950
control: pid
pid_Kp: 46.504839
pid_Ki: 1.453276
pid_Kd: 372.038710
min_temp: -200
max_temp: 125

[verify_heater heater_bed]
max_error: 120
check_gain_time: 120
hysteresis: 5
heating_gain: 2

[temperature_sensor box]
sensor_pin: PB13
sensor_type: Generic 3950
min_temp: -200
max_temp: 125

[fan_generic model_helper_fan]
pin: PG17

[fan_generic box_fan]
pin: PG18

[controller_fan mainboard]
pin: PG16
tachometer_pin: PG6
idle_speed: 0