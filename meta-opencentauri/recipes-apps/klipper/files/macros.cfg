# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# EDITING THIS FILE WILL EXCLUDE YOUR CHANGES FROM FUTURE UPDATES.
# -----

[gcode_macro _COSMOS_SETTINGS]
variable_sync_camera_led_to_chamber_led: False
variable_camera_led_default_on: True
gcode:

[gcode_macro _GLOBAL_VARS]
variable_extruder_target: 230 
gcode:

[gcode_macro PRINT_START]
gcode:
    SET_GCODE_VARIABLE MACRO=_GLOBAL_VARS VARIABLE=extruder_target VALUE={params.EXTRUDER_TEMP}

# Home Z with Strain Gauge, ends up with the nozzle 2mm above bed
[gcode_macro STRAINGAUGE_Z_HOME]
gcode:
    SAVE_GCODE_STATE NAME=straingauge_z_home_state

    # TODO: Clear bed mesh

    # Move down a Z to get some clearance
    G91                             ; Relative positioning
    G1 Z2 F600                      ; Move up 2mm
    G90

    PROBE                           ; Probe with strain gauge

    M400                            ; Wait for moves to finish

    # Store the end position as new Z=0
    SET_KINEMATIC_POSITION Z=0 SET_HOMED=Z ; Set current Z as 0

    # Move up 2mm from the probed position
    G91                             ; Relative positioning
    G1 Z2 F600                      ; Move up 2mm
    M400                            ; Wait for moves to finish
    G90                             ; Absolute positioning

    # TODO: Restore bed mesh

    RESTORE_GCODE_STATE NAME=straingauge_z_home_state

# Wipe Nozzle, see auto_leveling.cpp:443
[gcode_macro M729]
gcode:
    SAVE_GCODE_STATE NAME=m729_saved_state

    G90

    # Move to tray
    G1 X202 F6000
    G1 Y264.5 F6000

    # Wipe
    G1 X173 F8000
    G1 X187
    G1 X173
    G1 X187
    G1 X173

    # Move a 2mm on Y
    G1 Y262.5

    # Wipe
    G1 X187 F8000
    G1 X173
    G1 X187
    G1 X173
    G1 X187
    G1 X173

    # Add some clearance
    G1 Y250

    # Move back to tray
    G1 X202
    G1 Y264.5 F1200

    # Clear command queue
    M400

    RESTORE_GCODE_STATE NAME=m729_saved_state

[gcode_macro WIPE_NOZZLE]
gcode:
    {% set bed_temp = params.BED_TEMP|default(60)|float %}

    G28                             ; Home
    M204 S5000                      ; Set acceleration to 5000 mm/s
    M400                            ; Wait for moves to finish
    G90                             ; Absolute positioning
    M106 S0                         ; Turn off part cooling fan
    SET_FAN_SPEED FAN=model_helper_fan SPEED=0 ; Turn off auxiliary fan
    M83                             ; Relative extrusion mode

    # Move to purge position
    G1 X202 Y250 F20000             ; Rapid move to purge area
    G1 Y264.5 F1200                 ; Move to exact purge Y position
    M109 S250                       ; Heat nozzle to 250°C and wait

    # Purge filament (8 cycles)
    G92 E0                          ; Reset extruder position
    M106 S255                       ; Turn on part cooling fan (full speed)
    SET_FAN_SPEED FAN=model_helper_fan SPEED=1 ; Turn on auxiliary fan (full speed)
    G1 E13 F523                     ; Extrude 13mm at medium speed
    G1 E2 F150                      ; Extrude 2mm slowly (ensure flow)
    M400                            ; Wait for completion
    G1 E13 F523                     ; Repeat purge cycle 2
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 3
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 4
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 5
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 6
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 7
    G1 E2 F150
    M400
    G1 E13 F523                     ; Repeat purge cycle 8
    G1 E2 F150
    M400
    G1 E-2 F1800                    ; Retract 2mm to prevent oozing

    # Cool nozzle for cleaning
    M109 S180                       ; Cool to 180°C and wait
    M400                            ; Wait for moves
    M104 S140                       ; Start cooling to final temp (140°C)
    G4 S4                           ; Dwell 4 seconds

    # Wipe nozzle using M729 pattern
    M204 S15000                     ; Set high acceleration for wipe
    M729                            ; Execute wipe pattern (moves across wiper)
    M204 S5000                      ; Restore normal acceleration

    # --- ADDITIONAL NOZZLE CLEANING ---
    G1 X128 Y254 F3000              ; Move to cleaning brush area
    M140 S{bed_temp}                ; Keep bed at target temp

    STRAINGAUGE_Z_HOME              ; Home Z using strain gauge

    M400                            ; Wait for completion
    #G91                             ; Relative positioning
    #G1 Z2 F600                      ; Lift Z by 2mm
    #G90                             ; Absolute positioning
    G1 Z2 F600                      ; Ensure Z is 2mm above bed

    G1 Y261.5 F9000                 ; Move to brush position
    G91                             ; Relative positioning
    G1 Z-2.5 F600                   ; Lower into brush
    M400                            ; Wait for position

    # Scrub nozzle back and forth (4 passes)
    G90                             ; Absolute positioning
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Scrub right
    G1 X110                         ; Scrub left
    G1 X140 F2000                   ; Final scrub right
    G1 X128                         ; Return to center
    M400                            ; Wait for completion

    # Lift and move away from brush
    G91                             ; Relative positioning
    G1 Z3 F600                      ; Lift Z by 3mm
    M400                            ; Wait
    G90                             ; Absolute positioning
    G1 Y254 F9000                   ; Move away from brush
    G1 X128 F9000                   ; Center X position

    # --- CALIBRATION PREPARATION ---
    M140 S{bed_temp}                ; Keep bed at target temp
    STRAINGAUGE_Z_HOME              ; Home Z with strain gauge again
    #G91                             ; Relative positioning
    #G1 Z-2.5 F600                   ; Lower slightly
    #G90                             ; Absolute positioning
    M400                            ; Wait for completion

    # Heat to calibration temperatures
    M140 S{bed_temp}                ; Heat bed to target temp
    M109 S140                       ; Heat nozzle to 140°C and wait
    M400                            ; Wait for stability
    M106 S0                         ; Turn off part cooling fan
    SET_FAN_SPEED FAN=model_helper_fan SPEED=0 ; Turn off auxiliary fan

    # Final positioning before probe calibration
    G91                             ; Relative positioning
    G1 Z2 F600                      ; Lift Z by 2mm
    G90                             ; Absolute positioning

# Bed Mesh Calibration Macro with temperature and wipe
[gcode_macro BED_MESH_CALIBRATE_WITH_WIPE]
gcode:
    {% set bed_temp = params.BED_TEMP|default(60)|float %}
    
    M104 S140                       ; Set nozzle temp to 140°C
    M140 S{bed_temp}                ; Set bed temp
    M106 S0                         ; Turn off part cooling fan
    SET_FAN_SPEED FAN=model_helper_fan SPEED=0 ; Turn off auxiliary fan
    SET_FAN_SPEED FAN=box_fan SPEED=0 ; Turn off box fan

    WIPE_NOZZLE BED_TEMP={bed_temp}  ; Clean nozzle before probing

    M140 S{bed_temp}                ; Set bed temp
    M104 S140                       ; Set nozzle temp to 140°C

    SET_GCODE_OFFSET Z=0 MOVE=0     ; Reset Z offset

    G28 Z0                          ; Home Z only using photoelectric sensor

    M109 S140                       ; Ensure nozzle at 140°C
    M190 S{bed_temp}                ; Ensure bed temp

    BED_MESH_CALIBRATE              ; Start bed mesh calibration

    MOVE_TO_TRAY                    ; Move to tray after calibration
    M106 S0                         ; Turn off part cooling fan
    SET_FAN_SPEED FAN=model_helper_fan SPEED=0 ; Turn off auxiliary fan
    M104 S0                         ; Turn off nozzle heater
    M140 S0                         ; Turn off bed heater

# Move the toolhead to the tray
[gcode_macro MOVE_TO_TRAY]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    G90                             ; Absolute positioning
    G0 X202 Y250 F12000             ; Move near to the try
    G0 Y264.5 F1200                 ; Move slowly back to the tray

    M400                            ; Wait for movements to complete

[gcode_macro _LOAD_FILAMENT_STEP_PUSH]
gcode:
    _CLOSE_PROMPT                   ; Close any existing prompt
    M83                            ; Relative extrusion mode
    G92 E0                         ; Reset extruder position
    G1 E120 F240                   ; Move filament into the extruder (120mm at 4mm/s)
    M729                           ; Wipe nozzle after loading

    RESPOND TYPE=command MSG="action:prompt_begin Loading Filament"
    RESPOND TYPE=command MSG="action:prompt_text Load completed. Do you want to purge more?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Purge more|_LOAD_FILAMENT_STEP_PUSH"
    RESPOND TYPE=command MSG="action:prompt_footer_button Done|_LOAD_FILAMENT_STEP_DONE"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_FILAMENT_STEP_DONE]
gcode:
    M729                            ; Wipe nozzle after loading
    M104 S0                         ; Turn off nozzle heater
    M106 S0                         ; Turn off part cooling fan
    _CLOSE_PROMPT                    ; Close the loading prompt

[gcode_macro LOAD_FILAMENT]
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(250)|float %}

    M104 S{extruder_temp}           ; Start heating the nozzle

    MOVE_TO_TRAY                    ; Move to the tray
    M109 S{extruder_temp}           ; Wait for nozzle to reach temp
    M106 S255                       ; Turn on part cooling fan (full speed)
    _LOAD_FILAMENT_STEP_PUSH        ; Push filament into extruder and wipe

# Cuts the tip of the filament and ejects it from the extruder
[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    G90                             ; Absolute positioning
    G0 Z14.5 F600                   ; Ensure we have some Z clearance
    G0 Y30 F15000                    ; Get some clearance for Y
    G0 X255 F8000                  ; Move to cutting position
    G0 Y3 F1200                     ; Cut
    G0 Y30 F8000                   ; Retract from cutting
    M400                            ; Wait for movements to complete

    MOVE_TO_TRAY                    ; Move to the tray
    FORCE_MOVE STEPPER=extruder DISTANCE=-30 VELOCITY=4 ; Move the filament out of the extruder

    M400                            ; Wait for movements to complete

[gcode_macro _HOME_X]
gcode:
    # Home X
    G28 X 
    M400

    # Move away
    G91
    G1 X-20 F4800
    G90

[gcode_macro _HOME_Y]
gcode:
    # Home Y
    G28 Y
    M400

    # Move away
    G91
    G1 Y30 F4800
    G90

[delayed_gcode startup]
initial_duration: 1
gcode:
  {% set settings = printer["gcode_macro _COSMOS_SETTINGS"]|default({}) %}
  {% set camera_led_on = settings.camera_led_default_on|default(false)|lower == 'true' %}

  {% if camera_led_on %}
    RUN_SHELL_COMMAND CMD=CAMERA_LIGHT_ON
  {% endif %}

  _CHECK_INITIAL_CALIBRATION

  BED_MESH_PROFILE LOAD=default

[homing_override]
axes: yxz
gcode:
    {% set bed_mesh = printer.bed_mesh.profile_name %}
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
    # On the Centauri Carbon 1, 8mm is the requested minimum Z clearance before XY homing.
    {% set safe_z = 8.0 %}
    {% set safe_z_feedrate = 1500 %}
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].home_current|float %}
    {% set HOME_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].home_current|float %}

    BED_MESH_CLEAR

    # Set lower current for homing
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT_Y}

    # Pause to ensure driver stall flag is clear
    G4 P500

    # Ensure Z clearance before XY homing when Z homing is requested
    {% if home_all or 'Z' in params %}
      {% if 'z' in printer.toolhead.homed_axes %}
        {% if printer.gcode_move.gcode_position.z|float < safe_z %}
          G90
          G0 Z{safe_z} F{safe_z_feedrate}
        {% endif %}
      {% else %}
        # When Z is unhomed, normal G0/G1 moves are unavailable, so use a short
        # positive force move to create the requested minimum clearance first.
        # WARNING: This intentionally assumes the printer is in a state where a
        # +8mm Z move is safe and that Z is not already at its positive travel limit
        # before continuing with the requested Z homing sequence.
        FORCE_MOVE STEPPER=stepper_z DISTANCE={safe_z} VELOCITY={safe_z_feedrate / 60}
      {% endif %}
      # Wait for the Z clearance move to finish before starting XY homing moves.
      M400
    {% endif %}

    # First X home. Note this may crash into the back steppers.
    {% if home_all or 'X' in params %}
      _HOME_X
    {% endif %}

    # First Y Home. 
    {% if home_all or 'Y' in params %}
      _HOME_Y
    {% endif %}
    
    # Second X home (if homing both X and Y) to home x at a known good position for sensorless homing
    {% if home_all or ('X' in params and 'Y' in params) %}
      _HOME_X
    {% endif %}

    # Second Y home just in case the X home caused a jump in Y
    {% if home_all or ('X' in params and 'Y' in params) %}
      _HOME_Y
    {% endif %}

    # Restore running current after homing
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}
    
    {% if home_all or 'Z' in params %}
        G90 # Absolute positioning
        G1 X125 Y125 F15000 # Move to center of the bed for Z homing
        G28 Z # Home Z
        G0 Z10 F1500 # Move down after homing
    {% endif %}

    {% if bed_mesh != "" %}
      BED_MESH_PROFILE LOAD="{bed_mesh}"
    {% endif %}
    
[gcode_macro _SHOW_PROMPT]
gcode:
    {% set title = params.TITLE|default('Please wait') %}
    {% set message = params.MESSAGE %}
    {% set esc_title = title|replace('"','\\"') %}
    {% set esc_message = message|replace('"','\\"') %}

    RESPOND TYPE=command MSG="action:prompt_begin {esc_title}"
    RESPOND TYPE=command MSG="action:prompt_text {esc_message}"
    RESPOND TYPE=command MSG="action:prompt_footer_button Dismiss|RESPOND TYPE=command MSG=action:prompt_end"

    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CLOSE_PROMPT]
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro SET_DISPLAY_TEXT]
rename_existing: SET_DISPLAY_TEXT_BASE
gcode:
    {% set message = params.MSG|default('') %}

    {% if message %}
        {action_respond_info(message)}
    {% endif %}

    SET_DISPLAY_TEXT_BASE MSG="{message}"

[gcode_macro SAVE_CONFIG]
rename_existing: SAVE_CONFIG_BASE
gcode:
    _CLOSE_PROMPT
    G4 P1000 ; Wait 1 second to ensure prompt is closed
    SAVE_CONFIG_BASE

[gcode_macro _SAVE_CONFIG_PROMPT]
description: Save the current configuration with a user prompt
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Save Configuration"
    RESPOND TYPE=command MSG="action:prompt_text Do you want to save the current configuration? This will save all current settings and will overwrite previous configurations."
    RESPOND TYPE=command MSG="action:prompt_text If you'd like to check the current settings before saving, please dismiss this prompt. You can save the current configuration by running the SAVE_CONFIG command directly."
    RESPOND TYPE=command MSG="action:prompt_footer_button Save|SAVE_CONFIG|warning"
    RESPOND TYPE=command MSG="action:prompt_footer_button Dismiss, Save later|_CLOSE_PROMPT"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _FULL_CALIBRATION]
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(220)|float %}
    {% set bed_temp = params.BED_TEMP|default(60)|float %}

    _CLOSE_PROMPT

    SET_DISPLAY_TEXT MSG="Calibrating load cells (1/4)"
    G28
    M400
    LOAD_CELL_SAVE_TARE
    G4 P2000

    SET_DISPLAY_TEXT MSG="Performing shaper calibration (2/4)"
    SHAPER_CALIBRATE AXIS=X
    SHAPER_CALIBRATE AXIS=Y

    SET_DISPLAY_TEXT MSG="Performing probe z-offset & bed mesh calibration (3/4)"
    BED_MESH_CALIBRATE_WITH_WIPE BED_TEMP={bed_temp}

    SET_DISPLAY_TEXT MSG="Performing extruder PID calibration (4/4)"
    MOVE_TO_TRAY
    PID_CALIBRATE HEATER=extruder TARGET={extruder_temp}
    M729

    SET_DISPLAY_TEXT ; Clear screen message
    _SAVE_CONFIG_PROMPT

[gcode_macro FULL_CALIBRATION]
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(220)|float %}
    {% set bed_temp = params.BED_TEMP|default(60)|float %}

    RESPOND TYPE=command MSG="action:prompt_begin Preparation: Full Calibration"
    RESPOND TYPE=command MSG="action:prompt_text Please clear the bed and toolhead of any foreign objects. Make sure the build plate is on top of the bed."
    RESPOND TYPE=command MSG="action:prompt_text The calibration process will take approximately 30 minutes to complete. Do you want to start the full calibration process now?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CLOSE_PROMPT"
    RESPOND TYPE=command MSG="action:prompt_footer_button Start Calibration|_FULL_CALIBRATION EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}|primary"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos: True
variable_custom_park_x: 202
variable_custom_park_y: 264.5
gcode:

[gcode_macro Bed_Level_Screws_Tune]
gcode:
    {% set bed_temp = params.BED_TEMP|default(60)|float %}
    BED_MESH_CLEAR
    M104 S140
    M400
    G28
    M109 S140
    M729
    SCREWS_TILT_CALCULATE

[gcode_macro _INITIAL_CALIBRATION_ACTION_LATER]
gcode:
      RESPOND TYPE=command MSG="action:prompt_begin Welcome to COSMOS!"
      RESPOND TYPE=command MSG="action:prompt_text You can calibrate anytime by running the FULL_CALIBRATION gcode command."
      RESPOND TYPE=command MSG="action:prompt_text Initial calibration is required before printing!"
      RESPOND TYPE=command MSG="action:prompt_text You can bypass automatic calibration, but if you do not run calibration manually you may damage your build plate or hotend."
      RESPOND TYPE=command MSG="action:prompt_footer_button Bypass Calibration|_CLOSE_PROMPT|error"
      RESPOND TYPE=command MSG="action:prompt_footer_button Calibrate Printer|FULL_CALIBRATION|primary"
      RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CHECK_INITIAL_CALIBRATION]
gcode:
    {% set shaper_freq_x = printer.configfile.settings.input_shaper.shaper_freq_x|default(0)|float %}
    {% set shaper_freq_y = printer.configfile.settings.input_shaper.shaper_freq_y|default(0)|float %}
    {% set shaper_calibrated = shaper_freq_x > 0 and shaper_freq_y > 0 %}
    {% set bed_mesh_default_exists = 'bed_mesh default' in printer.configfile.settings %}

    {% if not shaper_calibrated and not bed_mesh_default_exists %}
      RESPOND TYPE=command MSG="action:prompt_begin Welcome to COSMOS!"
      RESPOND TYPE=command MSG="action:prompt_text It looks like you haven't ran the initial calibration yet. Would you like to run it now? This will perform all necessary calibrations to get your printer ready for use, including input shaper and bed mesh calibration."
      RESPOND TYPE=command MSG="action:prompt_footer_button Bypass Calibration|_INITIAL_CALIBRATION_ACTION_LATER|warning"
      RESPOND TYPE=command MSG="action:prompt_footer_button Calibrate Printer|FULL_CALIBRATION|primary"
      RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}