# SquashFS support (for read-only rootfs)
CONFIG_SQUASHFS=y
CONFIG_SQUASHFS_XZ=y
CONFIG_SQUASHFS_LZO=y
CONFIG_SQUASHFS_ZSTD=y

# OverlayFS support (writable layer over squashfs)
CONFIG_OVERLAY_FS=y

# Filesystem support for USB drives
CONFIG_VFAT_FS=y
CONFIG_FAT_DEFAULT_UTF8=y
CONFIG_NLS_CODEPAGE_437=y
CONFIG_NLS_ISO8859_1=y
CONFIG_NLS_UTF8=y
CONFIG_EXT4_FS=y

# Swap + zram compressed swap
CONFIG_SWAP=y
CONFIG_ZRAM=m
CONFIG_ZRAM_DEF_COMP_LZO=y
CONFIG_CRYPTO_LZO=y
