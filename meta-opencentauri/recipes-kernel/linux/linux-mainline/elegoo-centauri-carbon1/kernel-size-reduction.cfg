# Kernel size reduction for Elegoo Centauri Carbon 1
# bootA partition is only 6.17 MB -- zImage + DTB + initramfs must fit.
# This fragment disables features from the generic arm/defconfig that
# are not needed on the R528/T113-S3 3D-printer board.

# ============================================================
# XZ kernel compression (saves ~1.5-1.8 MB vs gzip)
# ============================================================
CONFIG_KERNEL_XZ=y

# ============================================================
# Reduce CPU count (T113 is dual-core, base has NR_CPUS=8)
# ============================================================
CONFIG_NR_CPUS=2

# ============================================================
# Module unload support (stock firmware has it, base lacks it)
# ============================================================
CONFIG_MODULE_UNLOAD=y

# ============================================================
# RFKILL (may be needed for WiFi power management)
# ============================================================
CONFIG_RFKILL=y

# ============================================================
# No BPF syscall / JIT (saves ~300 KB built-in)
# ============================================================
# CONFIG_BPF_SYSCALL is not set
# CONFIG_BPF_JIT is not set

# ============================================================
# No NFS / SUNRPC / ROOT_NFS / IP_PNP (saves ~600-800 KB)
# ============================================================
# CONFIG_NFS_FS is not set
# CONFIG_ROOT_NFS is not set
# CONFIG_IP_PNP is not set
# CONFIG_IP_PNP_DHCP is not set
# CONFIG_IP_PNP_BOOTP is not set

# ============================================================
# No hibernation (embedded device, 128 MB RAM)
# ============================================================
# CONFIG_HIBERNATION is not set

# ============================================================
# No SATA/AHCI (no SATA hardware on R528)
# ============================================================
# CONFIG_AHCI_SUNXI is not set

# ============================================================
# No MD/RAID/DM (no RAID on a 3D printer)
# ============================================================
# CONFIG_MD is not set

# ============================================================
# No Bluetooth (saves ~50 KB built-in + many modules)
# ============================================================
# CONFIG_BT is not set

# ============================================================
# No PPP
# ============================================================
# CONFIG_PPP is not set

# ============================================================
# No IP_VS (virtual server load balancing)
# ============================================================
# CONFIG_IP_VS is not set

# ============================================================
# No 6LoWPAN / IEEE 802.15.4
# ============================================================
# CONFIG_6LOWPAN is not set
# CONFIG_IEEE802154 is not set

# ============================================================
# No bonding/teaming/tunnels/VXLAN
# ============================================================
# CONFIG_BONDING is not set
# CONFIG_NET_TEAM is not set
# CONFIG_VXLAN is not set

# ============================================================
# No old Allwinner SoC peripherals (not on T113/R528)
# ============================================================
# SUN4I_EMAC -- old A10/A20 ethernet, T113 uses STMMAC
# CONFIG_SUN4I_EMAC is not set
# P2WI -- A31 only
# CONFIG_I2C_SUN6I_P2WI is not set
# SUN4I SPI -- old, T113 uses SUN6I SPI
# CONFIG_SPI_SUN4I is not set
# SUN9I USB PHY -- A80 only
# CONFIG_PHY_SUN9I_USB is not set

# ============================================================
# No keyboard/mouse input (keep touchscreen via fragment.cfg)
# ============================================================
CONFIG_INPUT_KEYBOARD=y
CONFIG_INPUT_MOUSE=y

# ============================================================
# Trim media subsystem -- camera/UVC only, no TV/DVB/radio/SDR
# ============================================================
# CONFIG_MEDIA_ANALOG_TV_SUPPORT is not set
# CONFIG_MEDIA_DIGITAL_TV_SUPPORT is not set
# CONFIG_MEDIA_RADIO_SUPPORT is not set
# CONFIG_MEDIA_SDR_SUPPORT is not set
# CONFIG_MEDIA_RC_SUPPORT is not set

# ============================================================
# Disable WiFi drivers we don't need (RTL8821CU uses out-of-tree rtw88)
# All these are enabled as modules in the base arm/defconfig.
# ============================================================
# CONFIG_LIBERTAS_THINFIRM is not set
# CONFIG_AT76C50X_USB is not set
# CONFIG_USB_ZD1201 is not set
# CONFIG_USB_NET_RNDIS_WLAN is not set
# CONFIG_RTL8187 is not set
# CONFIG_ATH_CARDS is not set
# CONFIG_CARL9170 is not set
# CONFIG_ATH6KL is not set
# CONFIG_AR5523 is not set
# CONFIG_ATH10K is not set
# CONFIG_WCN36XX is not set
# CONFIG_B43 is not set
# CONFIG_BRCMFMAC is not set
# CONFIG_HOSTAP is not set
# CONFIG_LIBERTAS is not set
# CONFIG_P54_COMMON is not set
# CONFIG_RT2X00 is not set
# CONFIG_RTL8192CU is not set
# CONFIG_WL_TI is not set
# CONFIG_ZD1211RW is not set
# CONFIG_MWIFIEX is not set
# CONFIG_CW1200 is not set
# CONFIG_RSI_91X is not set

# ============================================================
# Trim USB serial -- keep CP210X, FTDI, PL2303, add CH341
# ============================================================
# CONFIG_USB_SERIAL_KEYSPAN is not set
# CONFIG_USB_SERIAL_KLSI is not set
# CONFIG_USB_SERIAL_MOS7720 is not set
# CONFIG_USB_SERIAL_MOS7840 is not set
CONFIG_USB_SERIAL_CH341=m

# ============================================================
# Trim LEDs -- keep GPIO/regulator + basic triggers
# ============================================================
# CONFIG_LEDS_CLASS_FLASH is not set
# CONFIG_LEDS_LM3530 is not set
# CONFIG_LEDS_LP3944 is not set
# CONFIG_LEDS_LP5521 is not set
# CONFIG_LEDS_LP5523 is not set
# CONFIG_LEDS_LP5562 is not set
# CONFIG_LEDS_LP8501 is not set
# CONFIG_LEDS_PCA955X is not set
# CONFIG_LEDS_PCA963X is not set
# CONFIG_LEDS_DAC124S085 is not set
# CONFIG_LEDS_BD2802 is not set
# CONFIG_LEDS_LT3593 is not set
# CONFIG_LEDS_TCA6507 is not set
# CONFIG_LEDS_LM355x is not set
# CONFIG_LEDS_BLINKM is not set

# ============================================================
# Trim initrd decompressors -- our initramfs is .cpio.gz
# ============================================================
# CONFIG_RD_BZIP2 is not set
# CONFIG_RD_LZMA is not set
# CONFIG_RD_XZ is not set
# CONFIG_RD_LZO is not set
# CONFIG_RD_LZ4 is not set
# CONFIG_RD_ZSTD is not set

# ============================================================
# No XFS/BTRFS (not needed, saves significant space)
# ============================================================
# CONFIG_XFS_FS is not set
# CONFIG_BTRFS_FS is not set

# ============================================================
# No ISO9660/UDF (no CD-ROM)
# ============================================================
# CONFIG_ISO9660_FS is not set
# CONFIG_UDF_FS is not set

# ============================================================
# No FSCACHE/CACHEFILES (NFS caching, we removed NFS)
# ============================================================
# CONFIG_FSCACHE is not set
# CONFIG_CACHEFILES is not set

# ============================================================
# No BLK_DEV_INTEGRITY, MAC_PARTITION, LDM_PARTITION
# (enterprise/exotic partition types)
# ============================================================
# CONFIG_BLK_DEV_INTEGRITY is not set
# CONFIG_MAC_PARTITION is not set
# CONFIG_LDM_PARTITION is not set

# ============================================================
# No NBD, RAM disk, packet CD writing
# ============================================================
# CONFIG_BLK_DEV_NBD is not set
# CONFIG_BLK_DEV_RAM is not set
# CONFIG_CDROM_PKTCDVD is not set
